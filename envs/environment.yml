# Conda environment for the pipeline's Python stages plus KofamScan.
# Create with:  conda env create -f envs/environment.yml
# Activate with: conda activate immune_annotation
#
# InterProScan, OrthoFinder and seqkit are loaded as HPC modules inside the SLURM
# scripts and are NOT installed here. KofamScan (exec_annotation) IS installed
# here because it is not usually available as a module; it still needs its HMM
# database downloaded separately (see the README, "KofamScan database").
name: immune_annotation
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.9
  - pandas
  - numpy
  - requests
  - pyyaml
  - matplotlib
  - seaborn
  - matplotlib-venn
  - kofamscan
