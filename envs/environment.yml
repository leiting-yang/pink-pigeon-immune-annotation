# Conda environment for the Python post-processing stages of the pipeline.
# Create with:  conda env create -f envs/environment.yml
# Activate with: conda activate immune_annotation
#
# The heavy annotation tools (InterProScan, KofamScan, OrthoFinder, seqkit) are
# loaded as HPC modules inside the SLURM scripts and are NOT installed here.
name: immune_annotation
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.9
  - pandas
  - numpy
  - requests
  - pyyaml
  - matplotlib
  - seaborn
  - matplotlib-venn
