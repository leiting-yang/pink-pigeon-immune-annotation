# =============================================================================
# TEST CONFIG - Mauritius kestrel (Falco punctatus, bFalPun1.1, GCF_963210335.1)
# =============================================================================
# Reuses the three Pink Pigeon reference species (Mouse, Chicken, ZebraFinch).
# Run the Python stages with:  python <script> --config config/config_kestrel.yaml
#
# All stage work_dirs point at the same workspace so intermediate files land in
# one place. Reference-species data (BioMart CSVs, reference protein FASTAs) live
# in other_species/. The kestrel data is NCBI RefSeq, so stage 00 chromosome
# renaming is NOT needed (skip gffid_change.sh).
# =============================================================================

project_root: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation

reference:
  # NCBI RefSeq genome + annotation (download + gunzip into the workspace)
  gff3_raw: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation/GCF_963210335.1_bFalPun1.1_genomic.gff
  genome_fasta: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation/GCF_963210335.1_bFalPun1.1_genomic.fna
  # Produced by: extract_proteins.sh -g <genome.fna> -a <gff> -o Kestrel.faa
  protein_fasta: Kestrel.faa

external_data:
  # Reused from the Pink Pigeon run (species-independent / avian reference data)
  go_terms_immune: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation/other_species/go_terms_immune_system_process.txt
  gene_info: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation/other_species/gene_info.csv
  # Kestrel native gene-symbol table (Symbol <TAB> GeneID). Generate it from the
  # NCBI feature_table (see the run notes), or leave it missing and the symbol
  # comparison will simply report Novel/No_Info.
  ppg_native_symbols: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation/Kestrel_genes_by_name.tsv

species:
  target: Kestrel
  reference:
    - name: Mouse
      biomart: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation/other_species/processed_mouse_biomart.csv
      curated_list: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation/other_species/ImmuneGeneFunction_20240520.csv
    - name: Chicken
      biomart: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation/other_species/processed_chicken_biomart.csv
    - name: ZebraFinch
      biomart: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation/other_species/processed_zebrafinch_biomart.csv
  consensus_group: [Chicken, ZebraFinch]
  prediction_priority: [Chicken, ZebraFinch, Mouse]
  gene_info_enrichment: true          # kestrel is a bird, keep the avian gene_info step

# --- Stage 00 - preprocessing (OPTIONAL; skip for NCBI RefSeq) ----------------
preprocess:
  work_dir: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation
  chromosome_map: config/chromosome_id_map.tsv   # not used unless you run gffid_change.sh
  gff3_renamed: NM_genes.renamed.gff3
  gff3_autosomes: NM_genes.final.gff3

# --- Stage 01 - InterProScan -------------------------------------------------
interproscan:
  work_dir: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation
  merged_tsv: ipr_out/interproscan_merged.tsv
  immune_results: interproscan_immune_results.csv

# --- Stage 02 - KofamScan ----------------------------------------------------
kofamscan:
  work_dir: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation
  processing_dir: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation
  kegg_json: ko00001.json
  kofam_detail: result_kofam_detail.txt
  transcript_to_gene: transcript_to_gene.txt
  step_filtered_score: step1_filtered_score.txt
  step_immune_only: step2_immune_only.txt
  step_deduplicated: step3_final_deduplicated.txt
  gene_level: final_kofam_gene_level.tsv
  annotated: final_kofam_annotated.tsv

# --- Stage 03 - OrthoFinder --------------------------------------------------
orthofinder:
  work_dir: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation
  input_dir: ortho_input
  # >>> EDIT AFTER OrthoFinder FINISHES <<<
  # OrthoFinder creates ortho_input/OrthoFinder/Results_<Mon><Day>/. Replace
  # "Results_MonDD" below with the actual folder name it created.
  orthogroups_tsv:  ortho_input/OrthoFinder/Results_MonDD/Orthogroups/Orthogroups.tsv
  genecount_tsv:    ortho_input/OrthoFinder/Results_MonDD/Orthogroups/Orthogroups.GeneCount.tsv
  duplications_tsv: ortho_input/OrthoFinder/Results_MonDD/Gene_Duplication_Events/Duplications.tsv
  orthologues_dir:  ortho_input/OrthoFinder/Results_MonDD/Orthologues/Orthologues_Kestrel
  reference_mouse: reference_Mouse_final.csv
  master_lookup: master_lookup_table.csv
  filtered_list: Final_Filtered_List.csv
  og_stats_summary: OG_stats_summary.tsv
  filtered_with_og_stats: Final_Filtered_List_with_OG_stats.csv
  filtered_with_orthology: Final_Filtered_List_with_OG_stats_and_orthology.csv

# --- Stage 04 - tiering ------------------------------------------------------
tiering:
  work_dir: /maps/projects/echo/people/blv970/immune_test/pink-pigeon-immune-annotation
  master_list: Immune_Gene_Master_List.csv
  annotated_final: Immune_Annotated_Final.csv
  unmapped_symbols: Unmapped_Gene_Info_Symbols.txt
  predict_result: Immune_Predict_Result_Final.csv
  predict_with_og_stats: Immune_Predict_Result_Final_with_OG_stats.csv
  unmapped_og_proteins: Unmapped_OG_ProteinIDs.txt
  final_table: Immune_Predict_Result_Final_with_OG_and_Orthology.csv
  figure_dir: figures
