# =============================================================================
# Immune-gene annotation pipeline - central configuration (template)
# -----------------------------------------------------------------------------
# The example values below are the reference Pink Pigeon setup; replace them with
# your own paths, species and filenames. Every Python script accepts
# `--config <this file>` and reads its defaults here; any value can be overridden
# on the command line (CLI wins over the config value).
#
# LAYOUT CONVENTION (tidy outputs):
#   * INPUT files are referenced by ABSOLUTE paths, so each stage finds them
#     regardless of its work_dir.
#   * OUTPUT files go under  <workspace>/outputs/0X_<stage>/  (per-stage folders).
#
#   <workspace>/
#   ├── <genome>.fasta / <genome>.gff3 / <Target>.faa / *_biomart.csv / go_terms...
#   ├── ortho_input/                       (OrthoFinder input + its Results_<name>)
#   └── outputs/
#       ├── 01_interproscan/  02_kofamscan/  03_orthofinder/  04_tiering/(figures/)
#
# The SLURM batch scripts read config/cluster.sh (not this file); keep the
# per-stage *_WORK_DIR values there in sync with the work_dir values here.
# =============================================================================

# Root working directory (holds the inputs and the outputs/ tree).
project_root: /path/to/your/workspace

# -----------------------------------------------------------------------------
# Reference inputs (absolute paths; produced by the annotation project / downloaded)
# -----------------------------------------------------------------------------
reference:
  gff3_raw: /path/to/your/workspace/Nesoenas_mayeri-GCA_963082525.1-2023_10-genes.gff3
  genome_fasta: /path/to/your/workspace/GCA_963082525.1_bNesMay2.1_genomic.fasta
  # Produced by 00_preprocess/extract_proteins.sh (gffread + '.'/'*' cleaning).
  protein_fasta: /path/to/your/workspace/PinkPigeon.faa

# -----------------------------------------------------------------------------
# External data (absolute paths). Small bundled copies live in reference_data/;
# see reference_data/CITATIONS.md for provenance and download instructions.
# -----------------------------------------------------------------------------
external_data:
  go_terms_immune: /path/to/your/workspace/go_terms_immune_system_process.txt
  # Optional conserved immune-gene database (avian-oriented). Set
  # species.gene_info_enrichment: false to skip it.
  gene_info: /path/to/your/workspace/gene_info.csv
  # Target native gene symbols. Produced by 00_preprocess/extract_native_symbols.sh
  # (ON by default), or supply your own 2-column "Symbol <TAB> GeneID" file.
  native_symbols: /path/to/your/workspace/PinkPigeon_genes_by_name.tsv

# =============================================================================
# Species configuration  (drives all species-specific columns and logic)
# =============================================================================
species:
  target: PinkPigeon

  # Reference species. `biomart` is required; `curated_list` is optional.
  reference:
    - name: Mouse
      biomart: /path/to/your/workspace/processed_mouse_biomart.csv
      curated_list: /path/to/your/workspace/ImmuneGeneFunction_20240520.csv
    - name: Chicken
      biomart: /path/to/your/workspace/processed_chicken_combined.csv
    - name: ZebraFinch
      biomart: /path/to/your/workspace/processed_zebrafinch_combined.csv

  # --- Symbol prediction (stage 04, process_symbols.py) ---
  consensus_group: [Chicken, ZebraFinch]     # [] to disable the consensus rule
  prediction_priority: [Chicken, ZebraFinch, Mouse]

  # --- Final functional enrichment (stage 04, add_gene_info_3.py) ---
  gene_info_enrichment: true                 # false to skip gene_info.csv (non-avian)

# =============================================================================
# Stage 00 - preprocessing (chromosome-ID normalization; OPTIONAL)
# =============================================================================
# Only needed when the genome FASTA and GFF3 use different sequence IDs (e.g. an
# Ensembl GFF with simple IDs against an INSDC FASTA). Most NCBI RefSeq assemblies
# already match, so you can skip gffid_change.sh and point gff3_raw at the raw GFF3.
preprocess:
  work_dir: /path/to/your/workspace
  chromosome_map: config/chromosome_id_map.tsv
  gff3_renamed: NM_genes.renamed.gff3
  gff3_autosomes: NM_genes.final.gff3

# =============================================================================
# Stage 01 - InterProScan   (outputs -> outputs/01_interproscan)
# =============================================================================
# interproscan_run.sh writes ipr_chunks/ and ipr_out/ into IPR_WORK_DIR
# (config/cluster.sh), which MUST equal this work_dir.
interproscan:
  work_dir: /path/to/your/workspace/outputs/01_interproscan
  merged_tsv: ipr_out/interproscan_merged.tsv
  immune_results: interproscan_immune_results.csv

# =============================================================================
# Stage 02 - KofamScan   (outputs -> outputs/02_kofamscan)
# =============================================================================
# run_kofam.sh writes result_kofam_detail.txt into KOFAM_WORK_DIR
# (config/cluster.sh), which MUST equal this work_dir/processing_dir.
kofamscan:
  work_dir: /path/to/your/workspace/outputs/02_kofamscan
  processing_dir: /path/to/your/workspace/outputs/02_kofamscan
  kegg_json: ko00001.json
  kofam_detail: result_kofam_detail.txt
  transcript_to_gene: transcript_to_gene.txt
  step_filtered_score: step1_filtered_score.txt
  step_immune_only: step2_immune_only.txt
  step_deduplicated: step3_final_deduplicated.txt
  gene_level: final_kofam_gene_level.tsv
  annotated: final_kofam_annotated.tsv

# =============================================================================
# Stage 03 - OrthoFinder   (Python-stage tables -> outputs/03_orthofinder)
# =============================================================================
# input_dir and the OrthoFinder result paths stay under ortho_input/ (absolute),
# where the SLURM job runs OrthoFinder. run_orthofind.sh uses -n "$ORTHO_RUN_NAME"
# so the results folder is a fixed Results_<name> (replace <name> below to match).
orthofinder:
  work_dir: /path/to/your/workspace/outputs/03_orthofinder
  input_dir: /path/to/your/workspace/ortho_input
  orthogroups_tsv: /path/to/your/workspace/ortho_input/OrthoFinder/Results_pinkpigeon/Orthogroups/Orthogroups.tsv
  genecount_tsv: /path/to/your/workspace/ortho_input/OrthoFinder/Results_pinkpigeon/Orthogroups/Orthogroups.GeneCount.tsv
  duplications_tsv: /path/to/your/workspace/ortho_input/OrthoFinder/Results_pinkpigeon/Gene_Duplication_Events/Duplications.tsv
  orthologues_dir: /path/to/your/workspace/ortho_input/OrthoFinder/Results_pinkpigeon/Orthologues/Orthologues_PinkPigeon
  reference_mouse: reference_mouse_final.csv
  master_lookup: master_lookup_table.csv
  filtered_list: Final_Filtered_List.csv
  og_stats_summary: OG_stats_summary.tsv
  filtered_with_og_stats: Final_Filtered_List_with_OG_stats.csv
  filtered_with_orthology: Final_Filtered_List_with_OG_stats_and_orthology.csv

# =============================================================================
# Stage 04 - tiering   (outputs -> outputs/04_tiering)
# =============================================================================
tiering:
  work_dir: /path/to/your/workspace/outputs/04_tiering
  master_list: Immune_Gene_Master_List.csv
  annotated_final: Immune_Annotated_Final.csv
  unmapped_symbols: Unmapped_Gene_Info_Symbols.txt
  predict_result: Immune_Predict_Result_Final.csv
  predict_with_og_stats: Immune_Predict_Result_Final_with_OG_stats.csv
  unmapped_og_proteins: Unmapped_OG_ProteinIDs.txt
  final_table: Immune_Predict_Result_Final_with_OG_and_Orthology.csv
  figure_dir: figures
